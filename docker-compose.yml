version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: list_jeu_postgres
    environment:
      POSTGRES_USER: list_jeudb
      POSTGRES_PASSWORD: a
      POSTGRES_DB: list_jeu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U list_jeudb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: list_jeu_backend
    environment:
      ADDRESS: 0.0.0.0
      PORT: 8090
      DATABASE_URL: postgres://list_jeudb:a@postgres:5432/list_jeu
      SECRET: klkj-kljkl-jhjj-kjkj
      RUST_LOG: actix_web=info
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - list_jeu_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  list_jeu_network:
    driver: bridge
